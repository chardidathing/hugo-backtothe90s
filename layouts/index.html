{{ define "main" }}
  <h2 class="section-heading">Latest posts</h2>
  <div class="post-list">
    {{ $posts := where .Site.RegularPages "Section" "posts" }}
    {{ range first 4 $posts.ByDate.Reverse }}
      {{ partial "post-card.html" . }}
    {{ end }}
  </div>
  {{ if gt (len (where .Site.RegularPages "Section" "posts")) 4 }}
    <div class="see-all">
      <a href="/posts/">See all posts &raquo;</a>
    </div>
  {{ end }}
{{ end }}
