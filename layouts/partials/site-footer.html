<footer>
  {{ with .Site.Params.buttons }}
  <div class="buttons-88x31">
    {{ range . }}
      {{ if .url }}
        <a href="{{ .url }}"{{ if .url | findRE "^https?://" }} target="_blank" rel="noopener"{{ end }}>
          <img src="{{ .img }}" alt="{{ .alt | default "" }}" width="88" height="31" loading="lazy">
        </a>
      {{ else }}
        <img src="{{ .img }}" alt="{{ .alt | default "" }}" width="88" height="31" loading="lazy">
      {{ end }}
    {{ end }}
  </div>
  {{ end }}
  <div>&copy; {{ now.Format "2006" }} {{ .Site.Params.copyright | default .Site.Title }}</div>
  <div class="theme-picker">
    <label for="theme-select">Theme:</label>
    <select id="theme-select" class="theme-select">
      <option value="98-light">98 Light</option>
      <option value="98-dark">98 Dark</option>
      <option value="sakura-light">Sakura Light</option>
      <option value="sakura-dark">Sakura Dark</option>
    </select>
  </div>
</footer>
